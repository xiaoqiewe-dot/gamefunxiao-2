name: GameFunXiao
version: '${project.version}'
main: org.gamefunxiao.GameFunXiao
api-version: '1.21'
authors: [ bzd ]
description: GameFun 小游戏插件 - 猎人游戏

commands:
  gamefunxiao:
    description: GameFun 小游戏主命令
    usage: /gamefunxiao [子命令]
    aliases:
      - gfx
      - gamefun
  hh:
    description: 宣传当前房间
    usage: /hh
  ec:
    description: 终章中距离猎物100~170格打开末影箱
    usage: /ec
  enderchest:
    description: 终章末影箱完整命令
    usage: /enderchest
    aliases:
      - endflashender
  flashwiki:
    description: 获取闪光模式局内书 Wiki
    usage: /flashwiki
    aliases:
      - bookwiki
      - gamefunwiki

permissions:

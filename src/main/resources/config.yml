# 自定义金币设置
custom_currency:
  enabled: false
  name: "金币"
  # 扣除金币命令 (%player% 玩家名, %amount% 金币数)
  take_command: "/eco take %player% %amount%"
  # 给予金币命令
  give_command: "/eco give %player% %amount%"
  # 当前金币变量（PlaceholderAPI）
  balance_placeholder: "%vault_eco_balance%"

# 等待大厅可交互区域
# 用于在等待大厅世界里放行指定区域的告示牌、展示框、展示实体等交互。
lobby_interaction_regions:
  enabled: true
  regions: {}

# 子服设置
child_server:
  # 是否启用子服模式
  enabled: false
  # 当前服务器角色：standalone=单服原模式，lobby=大厅控制服，node=对子服节点
  role: "standalone"
  # 子服结束后返回的大厅服名（代理服里的 server 名）
  lobby_server_name: "gamefun"

  shared_storage:
    # 房间注册信息目录（大厅服和子服都要能访问到）
    room_registry_path: "D:/plus/GameFunShared/room-registry"
    # 玩家跨服暂存数据目录（大厅服和子服都要能访问到）
    playerdata_root: "D:/plus/GameFunShared"

  lobby:
    # 子服最长启动等待时间（秒）
    start_timeout_seconds: 60
    # 可用子服节点列表（这些 server 名需要提前写进代理服配置）
    nodes:
      node-1:
        proxy_server_name: "gamefun-node-1"
        host: "127.0.0.1"
        port: 25580
        # 子服模板目录
        template_dir: "D:/plus/Plu/ZJ plu/gamefun-node-template"
        # 子服运行时根目录（会自动创建按房间分开的实例目录）
        runtime_root: "D:/plus/Plu/ZJ plu/gamefun-generated"
        # Java 启动命令
        java_command: "java"
        # 模板目录里的服务端 jar 文件名
        server_jar: "leavesclip.jar"
        # 自定义 JVM 参数
        jvm_args:
          - "-Xms1G"
          - "-Xmx1G"
        # 如果你想完全自定义启动命令，就填这里；留空则使用上面的 java_command + server_jar
        startup_command: ""

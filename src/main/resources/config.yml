  # 只在这个代理服名上应用，避免影响 gamefun 大厅服
  target_server: "gameing"
  header:
    - '                                       '
    - '<gradient:#B988F9:#B988F9><b> QI YUAN </b></gradient>'
    - '<gradient:#F0A9BB:#F0A9BB>很荣幸您能</gradient><gradient:#F0A9BB:#F0A9BB>来</gradient>'
    - ''
  footer:
    - ''
    - '<gradient:#913DFF:#913DFF>§x§f§6§e§1§3§b§lの §r§x§f§6§e§1§3§b当前服务器 §r§8: §r%qichengmorebungeeapi_server%§r §x§f§6§e§1§3§b§lの'
    - '§r<gradient:#D2A6F4:#D2A6F4><b>></b> 服务器QQ群 : 1076620337 <b><<b/></gradient>'
    - '§r<gradient:#ADBBC5:#B988F9>mcqi.top</gradient>'
    - ''

# 菜单设置
menu:
  # 是否在菜单标题后显示版本号
  show_version: true
  # 版本号
  version: "v1.0.1"
  # 关闭按钮设置
  close_button:
    # 是否把关闭按钮显示成返回服务器主菜单按钮
    display_as_return_button: false
    # 点击返回按钮后执行的玩家命令（不要带/）
    return_command: "menu"

# 猎人游戏设置
hunter_game:
  # 房间后端模式：cross_server=跨服传送到固定小游戏服创建，current_server_world=在当前服务器创建世界，child_server=启动独立子服房间
  room_backend: "cross_server"
  cross_server:
    # 是否启用固定小游戏服传送；关闭时不会把玩家传到 gameing，会自动在当前服务器开房间
    enabled: true
    # 玩家创建/加入房间时要送去的代理服 server 名
    game_server_name: "gameing"
    # 游戏结束或退出后返回的大厅服 server 名
    lobby_server_name: "gamefun"
    # 跨服创建房间的临时请求目录（大厅服和游戏服都要能访问到）
    request_path: "D:/plus/GameFunShared/cross-create-requests"
    # gamefun 与 gameing 共用的玩家数据根目录（留空时会自动取 request_path 的上级目录）
    shared_playerdata_root: "D:/plus/GameFunShared"
    # 在 gameing 小游戏服宣传房间时，是否把宣传消息转发到 gamefun 大厅服
    forward_advertise_to_lobby: true
  performance:
    # 选择世界阶段预热区块半径（按区块计算，越大越顺滑，但创建世界瞬时压力越高）
    preload_radius: 2
    # 每轮同时请求的异步区块预热数量
    preload_parallel_tasks: 2
    # 是否启用懒加载维度（普通模式不在开局立即创建下界/末地，而是在首次需要时再创建）
    lazy_dimension_creation: true
  # 最少开始人数
  min_players: 2
  # 等待倒计时（秒）
  wait_countdown: 300
  # 世界选择时间（秒）
  world_selection_time: 120
  # 下界篇猎人落点投票时间（秒）
  nether_hunter_vote_time: 45
  # 闪光模式第二轮猎物投票的保底展示时长（秒）
  flash_mode:
    second_vote_seconds: 20
    # 音符盒真实谱源曲库：不再内置假谱。想要完全像原曲，请把 .mid/.midi/.nbs/.txt 谱源放进 plugins/GameFunXiao/flash-note-songs
    note_block_melodies:
      enabled: true
      install_bundled_songs: true
      scan_files: true
      scan_subfolders: true
      source_folder: "flash-note-songs"
      # 缓存刷新间隔，放新谱后最多等这个时间生效
      reload_interval_ms: 5000
      # 超过这个音符数量的谱会作为长谱大招
      long_min_notes: 48
      # 单首最多读取多少个音，必须和内部缓存上限保持一致
      max_notes_per_song: 220
      # 长谱会额外自动截取一段短谱攻击，避免曲库里全是全章大招
      auto_short_attacks: true
      short_attack_min_notes: 8
      short_attack_max_notes: 16
      # 也可以直接在这里写谱；tones 是音符盒档位 0~24，source 支持 .mid/.midi/.nbs/.txt
      songs: {}
  # 末地篇正式开局倒计时（秒）
  end_chapter_pre_start_countdown: 10
  # 存活模式时间（分钟）
  survival_time: 30
  # 管理员强制开始模式：direct=跳至10秒倒计时, skip_to_1min=跳至1分钟倒计时
  force_start_mode: "direct"
  # 1v1时猎人退出是否扣分
  one_vs_one_quit_penalty: true

  # 聊天设置
  chat:
    # 是否隔离房间聊天（等待、倒计时、选择世界、游戏中都会只发给同房间玩家）
    isolate_room_chat: true
    # 兼容旧配置：是否隔离游戏世界聊天
    isolate_game_chat: true
    # 是否通知旁观者加入
    notify_spectator_join: true
    # 管理员旁观是否通知
    admin_spectate_notify: false

  # 奖励设置
  rewards:
    # 猎物失败奖励（游戏结束后发放）
    fail_reward: 25

  # PvP 设置
  pvp:
    # 猎人攻击猎人是否造成伤害（true=会掉血, false=不会掉血但还是能攻击）
    hunter_friendly_fire: false

# 游戏中禁用的命令（通用）
disabled_commands:
  # 是否启用命令禁用功能
  enabled: true
  # 禁用的命令列表（不需要加/）
  commands:
    - "spawn"
    - "home"
    - "sethome"
    - "tpa"
    - "tpahere"
    - "back"
    - "warp"
    - "rtp"
# 尝试使用禁用命令时的提示消息
  blocked_message: "§x§F§F§8§8§5§5⚠ §c游戏进行中无法使用此命令！"

